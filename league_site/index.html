<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irene AC League Standings</title>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css"/>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
}

/* Title */
h1 {
    color: #0047AB;
    margin-bottom: 20px;
}

/* Tabs */
#tabs {
    margin-bottom: 15px;
}

.tab {
    margin-right: 10px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: bold;
    display: inline-block;
    border-radius: 6px;
    background: #e0e0e0;
    transition: 0.2s;
}

.tab:hover {
    background: #cfcfcf;
}

.tab.active-tab {
    background: #0047AB;
    color: white;
}

/* Table container */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* DataTables tweaks */
.dataTables_wrapper {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

/* Highlight top 3 */
tr:nth-child(1) td { font-weight: bold; background: #fff8e1; }
tr:nth-child(2) td { background: #f1f8ff; }
tr:nth-child(3) td { background: #f9f9f9; }

/* Mobile */
@media (max-width: 768px) {
    body { margin: 10px; }
}
</style>
</head>

<body>

<h1>Irene AC League Standings</h1>

<div id="tabs">
    <span class="tab" onclick="showTab('Overall', this)">Overall</span>
    <span class="tab" onclick="showTab('Male', this)">Male</span>
    <span class="tab" onclick="showTab('Female', this)">Female</span>
</div>

<!-- ================= TABLES ================= -->

<div id="Overall" class="tab-content">
    <!-- KEEP YOUR EXISTING TABLE HERE -->
</div>

<div id="Male" class="tab-content">
    <!-- KEEP YOUR EXISTING TABLE HERE -->
</div>

<div id="Female" class="tab-content">
    <!-- KEEP YOUR EXISTING TABLE HERE -->
</div>

<!-- ================= SCRIPT ================= -->

<script>
function showTab(name, el) {
    $('.tab-content').removeClass('active');
    $('#' + name).addClass('active');

    $('.tab').removeClass('active-tab');
    $(el).addClass('active-tab');
}

$(document).ready(function() {

    function initTable(id) {
        return $(id).DataTable({
            scrollX: true,
            pageLength: 25,
            order: [[6, "desc"]], // TotalPoints column
            fixedHeader: true,
            deferRender: true
        });
    }

    initTable('#table_Overall');
    initTable('#table_Male');
    initTable('#table_Female');

    // Default tab
    showTab('Overall', $('.tab').first());
});
</script>

</body>
</html>
