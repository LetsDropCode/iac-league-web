<!DOCTYPE html>
<html>
<head>
    <title>Irene AC League Standings</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- DataTables -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:12px;
            background:#f5f7fb;
        }

        h1{
            color:#0047AB;
            font-size:20px;
            margin-bottom:5px;
        }

        .nav{
            margin-bottom:10px;
        }

        .nav a{
            margin-right:10px;
            text-decoration:none;
            font-weight:bold;
            color:#0047AB;
            font-size:14px;
        }

        .updated{
            font-size:12px;
            color:#666;
            margin-bottom:10px;
        }

        .filter-container{
            margin-bottom:10px;
            font-size:14px;
        }

        select{
            padding:5px;
            border-radius:5px;
        }

        .table-container{
            background:white;
            padding:10px;
            border-radius:10px;
            box-shadow:0 3px 8px rgba(0,0,0,0.08);
            overflow-x:auto;
        }

        table.dataTable{
            font-size:13px;
        }

        table.dataTable thead th{
            background:#0047AB;
            color:white;
            white-space:nowrap;
        }

        table.dataTable tbody td{
            white-space:nowrap;
        }

        /* 🏆 Highlight podium */
        .rank-1{ background:#fff7cc; }
        .rank-2{ background:#f2f2f2; }
        .rank-3{ background:#ffe5cc; }

        /* 📱 MOBILE OPTIMISATION */
        @media (max-width: 768px){

            body{
                margin:8px;
            }

            h1{
                font-size:18px;
            }

            table.dataTable{
                font-size:12px;
            }

            /* 🔥 Sticky Name column */
            #leagueTable th:first-child,
            #leagueTable td:first-child{
                position:sticky;
                left:0;
                background:white;
                z-index:2;
            }

            /* 🔥 Sticky Rank column */
            #leagueTable th:nth-child(3),
            #leagueTable td:nth-child(3){
                position:sticky;
                left:120px;
                background:white;
                z-index:2;
            }

            /* Hide less important columns */
            #leagueTable th:nth-child(4),
            #leagueTable td:nth-child(4){
                display:none;
            }

        }

    </style>
</head>

<body>

<div class="nav">
    <a href="/">🏃 Run</a>
    <a href="/walk">🚶 Walk</a>
    <a href="/points">📊 Points System</a>
</div>

<h1>Irene AC {{ league }} League</h1>

<p class="updated">
    <strong>Updated:</strong> {{ last_updated }}
</p>

<div class="filter-container">
    <label><strong>Gender:</strong></label>
    <select id="genderFilter">
        <option value="">All</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
</div>

<div class="table-container">
    {{ table|safe }}
</div>

<script>
$(document).ready(function(){

    try {

        // -----------------------------
        // INIT TABLE
        // -----------------------------
        var table = $('#leagueTable').DataTable({
            scrollX: true,
            autoWidth: false,
            pageLength: 15,
            order: [[5, "desc"]], // shift because AthleteID added

            columnDefs: [
                { targets: 0, visible: false } // 🔥 hide AthleteID
            ],

            dom: '<"top"f>rt<"bottom"lip>',

            language:{
                search:"",
                searchPlaceholder:"🔍 Search name...",
                lengthMenu:"Show _MENU_",
                info:"_START_-_END_ of _TOTAL_"
            }
        });

        // -----------------------------
        // FIND COLUMN INDEXES (SAFE)
        // -----------------------------
        function findColumnIndex(name){
            var headers = $('#leagueTable thead th');
            for (var i = 0; i < headers.length; i++){
                if ($(headers[i]).text().trim().toLowerCase() === name.toLowerCase()){
                    return i;
                }
            }
            return -1;
        }

        var genderCol = findColumnIndex("Gender");
        var rankCol = findColumnIndex("Rank");

        console.log("Gender column index:", genderCol);

        // -----------------------------
        // GENDER FILTER (FIXED)
        // -----------------------------
        $('#genderFilter').on('change', function(){

            var val = $(this).val();

            if(genderCol !== -1){
                table.column(genderCol)
                     .search(val ? '^' + val + '$' : '', true, false)
                     .draw();
            }

        });

        // -----------------------------
        // PODIUM HIGHLIGHT
        // -----------------------------
        table.rows().every(function(){

            var data = this.data();

            if(rankCol === -1) return;

            var rank = parseInt(String(data[rankCol]).replace(/\D/g, ""));

            if(rank === 1){
                $(this.node()).addClass('rank-1');
            } else if(rank === 2){
                $(this.node()).addClass('rank-2');
            } else if(rank === 3){
                $(this.node()).addClass('rank-3');
            } else if(rank <= 10){
                $(this.node()).addClass('top-10');
            }

        });

        // -----------------------------
        // CLICKABLE ROWS (ATHLETE PROFILE)
        // -----------------------------
        $('#leagueTable tbody').on('click', 'tr', function () {

            var data = table.row(this).data();

            if (!data) return;

            var athleteId = data[0]; // hidden column

            window.location.href = "/athlete/" + athleteId;
        });


        // -----------------------------
        // MOBILE LABEL FIX
        // -----------------------------
        $('#leagueTable tbody tr').each(function(){
            $(this).find('td').each(function(i){
                var header = $('#leagueTable thead th').eq(i).text();
                $(this).attr('data-label', header);
            });
        });

    } catch (e){
        console.error("Table init failed:", e);
    }

});
</script>

</body>
</html>
