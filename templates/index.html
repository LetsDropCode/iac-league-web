<!DOCTYPE html>
<html>
<head>
<title>Irene AC {{ league }} League</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:12px;
    background:#f5f7fb;
}

h1{
    color:#0047AB;
    font-size:20px;
    margin-bottom:5px;
}

.nav{
    margin-bottom:10px;
}

.nav a{
    margin-right:10px;
    text-decoration:none;
    font-weight:bold;
    color:#0047AB;
    font-size:14px;
}

.updated{
    font-size:12px;
    color:#666;
    margin-bottom:10px;
}

/* 🔥 FILTER BAR */
.filter-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

select{
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* TABLE */
.table-container{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    overflow-x:auto;
}

table.dataTable{
    font-size:13px;
}

table.dataTable thead th{
    background:#0047AB;
    color:white;
    white-space:nowrap;
}

table.dataTable tbody tr:hover{
    background:#eef3ff;
    cursor:pointer;
}

/* PODIUM */
.rank-1{ background:#fff7cc; }
.rank-2{ background:#f2f2f2; }
.rank-3{ background:#ffe5cc; }

/* MOBILE */
@media (max-width: 768px){

    body{ margin:8px; }
    h1{ font-size:18px; }

    table.dataTable{ font-size:12px; }

    /* sticky first column only (safe) */
    #leagueTable th:first-child,
    #leagueTable td:first-child{
        position:sticky;
        left:0;
        background:white;
        z-index:2;
    }
}

</style>
</head>

<body>

<div class="nav">
    <a href="/">🏃 Run</a>
    <a href="/walk">🚶 Walk</a>
    <a href="/points">📊 Points System</a>
</div>

<h1>Irene AC {{ league }} League</h1>

<p class="updated">
<strong>Updated:</strong> {{ last_updated }}
</p>

<div class="filter-container">

<select id="genderFilter">
    <option value="">All Genders</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

<select id="categoryFilter">
    <option value="">All Categories</option>
</select>

</div>

<div class="table-container">
{{ table|safe }}
</div>

<script>
$(document).ready(function(){

    var table = $('#leagueTable').DataTable({
        scrollX:true,
        pageLength:15,
        autoWidth:false,
        order:[],
        dom:'<"top"f>rt<"bottom"lip>',
        language:{
            search:"",
            searchPlaceholder:"🔍 Search name..."
        }
    });

    // -----------------------------
    // FIND COLUMN INDEXES SAFELY
    // -----------------------------
    function findCol(name){
        var headers = $('#leagueTable thead th');
        for(let i=0;i<headers.length;i++){
            if($(headers[i]).text().trim().toLowerCase() === name.toLowerCase()){
                return i;
            }
        }
        return -1;
    }

    var genderCol = findCol("Gender");
    var categoryCol = findCol("PointsCategory");
    var rankCol = findCol("Rank");
    var idCol = findCol("AthleteID");

    // -----------------------------
    // HIDE BACKEND COLUMNS
    // -----------------------------
    if(idCol !== -1){
        table.column(idCol).visible(false);
    }

    // keep category hidden but usable
    if(categoryCol !== -1){
        table.column(categoryCol).visible(false);
    }

    // -----------------------------
    // GENDER FILTER (FIXED)
    // -----------------------------
    $('#genderFilter').on('change', function(){

        let val = $(this).val();

        if(genderCol !== -1){
            table.column(genderCol)
                 .search(val ? '^'+val+'$' : '', true, false)
                 .draw();
        }
    });

    // -----------------------------
    // CATEGORY FILTER (AUTO BUILD)
    // -----------------------------
    if(categoryCol !== -1){

        let categories = new Set();

        table.rows().every(function(){
            categories.add(this.data()[categoryCol]);
        });

        categories.forEach(function(c){
            $('#categoryFilter').append(`<option value="${c}">${c}</option>`);
        });

        $('#categoryFilter').on('change', function(){
            let val = $(this).val();
            table.column(categoryCol)
                 .search(val ? '^'+val+'$' : '', true, false)
                 .draw();
        });
    }

    // -----------------------------
    // PODIUM HIGHLIGHT
    // -----------------------------
    table.rows().every(function(){

        if(rankCol === -1) return;

        let rank = parseInt(String(this.data()[rankCol]).replace(/\D/g,""));

        if(rank === 1) $(this.node()).addClass('rank-1');
        else if(rank === 2) $(this.node()).addClass('rank-2');
        else if(rank === 3) $(this.node()).addClass('rank-3');
    });

    // -----------------------------
    // CLICKABLE ROWS (ROBUST)
    // -----------------------------
    $('#leagueTable tbody').on('click','tr',function(){

        let data = table.row(this).data();

        if(!data || idCol === -1) return;

        let athleteId = data[idCol];

        if(athleteId){
            window.location.href = "/athlete/" + athleteId;
        }
    });

});
</script>

</body>
</html>
