<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:20px;
            background:#f5f7fb;
            color:#1f2937;
        }

        .panel{
            max-width:360px;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 3px 8px rgba(0,0,0,0.08);
        }

        input, button{
            width:100%;
            box-sizing:border-box;
            padding:10px;
            border-radius:6px;
            font-size:15px;
        }

        input{
            border:1px solid #ccd3df;
            margin-bottom:10px;
        }

        button{
            border:0;
            background:#0047AB;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .error{
            color:#b42318;
            font-size:14px;
        }
    </style>
</head>
<body>
    <div class="panel">
    <h2>Admin Login</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit">Login</button>
    </form>
    </div>
</body>
</html>
